<div id="nseChat" class="fixed bottom-5 right-5 z-50">

  <!-- ── Toggle button — Tara star icon ─────────────────────────────────── -->
  <button id="chatToggle" aria-label="Ask Tara"
    style="width:56px;height:56px;border-radius:50%;background:linear-gradient(145deg,#1c2c5e,#16235b);border:1.5px solid rgba(245,158,11,0.45);box-shadow:0 8px 28px -6px rgba(11,19,52,0.55),0 0 0 0 rgba(245,158,11,0);display:grid;place-items:center;cursor:pointer;transition:transform .2s ease,box-shadow .2s ease;position:relative"
    onmouseover="this.style.transform='scale(1.08)';this.style.boxShadow='0 12px 32px -8px rgba(11,19,52,0.65),0 0 0 4px rgba(245,158,11,0.18)'"
    onmouseout="this.style.transform='';this.style.boxShadow='0 8px 28px -6px rgba(11,19,52,0.55),0 0 0 0 rgba(245,158,11,0)'">
    <!-- Friendly robot assistant (Tara) -->
    <svg width="30" height="30" viewBox="0 0 32 32" fill="none">
      <!-- antenna -->
      <line x1="16" y1="4.5" x2="16" y2="8" stroke="#f59e0b" stroke-width="2" stroke-linecap="round"/>
      <circle cx="16" cy="4" r="2" fill="#f59e0b"/>
      <!-- head -->
      <rect x="6" y="8" width="20" height="16" rx="6" fill="#f59e0b"/>
      <!-- face screen -->
      <rect x="8.5" y="11" width="15" height="10" rx="4" fill="#16235b"/>
      <!-- eyes -->
      <circle cx="13" cy="16" r="1.9" fill="#fff"/>
      <circle cx="19" cy="16" r="1.9" fill="#fff"/>
      <!-- smile -->
      <path d="M13 19.2 Q16 21 19 19.2" stroke="#fff" stroke-width="1.4" stroke-linecap="round" fill="none"/>
      <!-- ears -->
      <rect x="3.5" y="14" width="2.5" height="5" rx="1.25" fill="#f59e0b"/>
      <rect x="26" y="14" width="2.5" height="5" rx="1.25" fill="#f59e0b"/>
    </svg>
    <!-- Notification dot (always visible) -->
    <span style="position:absolute;top:3px;right:3px;width:9px;height:9px;border-radius:50%;background:#f59e0b;border:2px solid #16235b"></span>
  </button>

  <!-- ── Chat panel ──────────────────────────────────────────────────────── -->
  <div id="chatPanel" class="hidden absolute bottom-16 right-0 rounded-2xl shadow-2xl overflow-hidden"
       style="width:23rem;max-width:calc(100vw - 2rem);background:var(--s1);border:1px solid var(--hair2)">

    <!-- Header -->
    <div style="background:linear-gradient(135deg,#1c2c5e 0%,#16235b 100%);padding:14px 16px;display:flex;align-items:center;gap:10px">
      <!-- Avatar: robot face -->
      <div style="width:38px;height:38px;border-radius:50%;background:rgba(245,158,11,0.18);border:1.5px solid rgba(245,158,11,0.4);display:grid;place-items:center;flex-shrink:0">
        <svg width="22" height="22" viewBox="0 0 32 32" fill="none">
          <line x1="16" y1="5" x2="16" y2="8.5" stroke="#f59e0b" stroke-width="2" stroke-linecap="round"/>
          <circle cx="16" cy="4.5" r="1.8" fill="#f59e0b"/>
          <rect x="6" y="8.5" width="20" height="15.5" rx="6" fill="#f59e0b"/>
          <rect x="8.5" y="11.5" width="15" height="9.5" rx="4" fill="#16235b"/>
          <circle cx="13" cy="16" r="1.8" fill="#fff"/>
          <circle cx="19" cy="16" r="1.8" fill="#fff"/>
          <path d="M13 19 Q16 20.6 19 19" stroke="#fff" stroke-width="1.3" stroke-linecap="round" fill="none"/>
        </svg>
      </div>
      <div style="flex:1;line-height:1.3">
        <div style="font-weight:700;font-size:14px;color:#fff">Tara</div>
        <div style="font-size:11px;color:rgba(255,255,255,0.45);display:flex;align-items:center;gap:5px">
          <span style="width:6px;height:6px;border-radius:50%;background:#4ade80;flex-shrink:0"></span>
          Fire-safety assistant · Northern Star
        </div>
      </div>
      <!-- Close button -->
      <button id="chatClose"
        style="width:28px;height:28px;border-radius:8px;background:rgba(255,255,255,0.08);display:grid;place-items:center;cursor:pointer;border:none;color:rgba(255,255,255,0.5);transition:background .15s"
        onmouseover="this.style.background='rgba(255,255,255,0.16)'"
        onmouseout="this.style.background='rgba(255,255,255,0.08)'">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </button>
    </div>

    <!-- Chat log -->
    <div id="chatLog" class="overflow-y-auto px-3 py-3 space-y-2 text-sm"
         style="height:288px;background:var(--s2)">
      <div class="rounded-xl px-3 py-2.5" style="background:var(--s1);border:1px solid var(--hair);color:var(--ink2);line-height:1.5">
        Hi, I'm <strong>Tara</strong> ✦ Ask me about AMC plans, extinguisher refilling, emergency response, or fire NOC — I'm here to help.
      </div>
    </div>

    <!-- Input -->
    <form id="chatForm" style="display:flex;align-items:center;gap:8px;padding:10px;border-top:1px solid var(--hair)">
      <input id="chatInput" type="text" placeholder="Ask Tara anything…" autocomplete="off"
             style="flex:1;padding:8px 12px;font-size:13px;border-radius:10px;border:1px solid var(--hair2);background:var(--s1);color:var(--ink)">
      <button type="submit"
        style="background:#f59e0b;color:#18181b;font-weight:700;font-size:13px;padding:8px 14px;border-radius:10px;border:none;cursor:pointer;white-space:nowrap;transition:background .15s"
        onmouseover="this.style.background='#d97706'"
        onmouseout="this.style.background='#f59e0b'">Send</button>
    </form>
  </div>
</div>

<script>
(function () {
  const toggle = document.getElementById('chatToggle');
  const closeBtn = document.getElementById('chatClose');
  const panel = document.getElementById('chatPanel');
  const form = document.getElementById('chatForm');
  const input = document.getElementById('chatInput');
  const log = document.getElementById('chatLog');
  const history = [];

  toggle.addEventListener('click', () => {
    panel.classList.toggle('hidden');
    if (!panel.classList.contains('hidden')) input.focus();
  });
  if (closeBtn) closeBtn.addEventListener('click', () => panel.classList.add('hidden'));

  function esc(s){ return s.replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }
  function renderMd(text){
    const lines = esc(text).split(/\r?\n/);
    let html = '', inList = false;
    for (const raw of lines){
      const line = raw.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
      const m = line.match(/^\s*[-•]\s+(.*)$/);
      if (m){
        if (!inList){ html += '<ul class="list-disc pl-4 space-y-0.5 my-1">'; inList = true; }
        html += '<li>' + m[1] + '</li>';
      } else {
        if (inList){ html += '</ul>'; inList = false; }
        if (line.trim()) html += '<p class="my-1">' + line + '</p>';
      }
    }
    if (inList) html += '</ul>';
    return html || esc(text);
  }
  function bubble(text, who) {
    const div = document.createElement('div');
    if (who === 'user') {
      div.style.cssText = 'background:#16235b;color:#fff;border-radius:12px;padding:8px 12px;margin-left:2rem;line-height:1.5';
    } else {
      div.style.cssText = 'background:var(--s1);border:1px solid var(--hair);color:var(--ink2);border-radius:12px;padding:8px 12px;margin-right:1rem;line-height:1.5';
    }
    if (who === 'user') div.textContent = text; else div.innerHTML = renderMd(text);
    log.appendChild(div);
    log.scrollTop = log.scrollHeight;
    return div;
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const q = input.value.trim();
    if (!q) return;
    bubble(q, 'user');
    history.push({ role: 'user', content: q });
    input.value = '';
    const thinking = bubble('…', 'bot');
    try {
      const res = await fetch('{{ url_for("chat.ask") }}', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: history.slice(-10) })
      });
      const data = await res.json();
      const reply = data.reply || 'Sorry, something went wrong.';
      thinking.innerHTML = renderMd(reply);
      log.scrollTop = log.scrollHeight;
      history.push({ role: 'assistant', content: reply });
    } catch (err) {
      thinking.textContent = 'Network error. Please try again.';
    }
  });
})();
</script>
