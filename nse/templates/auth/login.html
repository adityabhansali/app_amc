{% extends "base.html" %}
{% block title %}Login — {{ COMPANY_NAME }}{% endblock %}
{% block content %}
<section class="max-w-md mx-auto px-4 py-16">
  <div class="card p-8">
    <h1 class="text-2xl font-extrabold text-ink">Customer login</h1>
    <p class="text-ink-subtle text-sm mt-1.5">Log in with your mobile number to track your AMC, visits and requests.</p>
    <form method="post" action="{{ url_for('auth.otp_request') }}" class="mt-6 space-y-4">
      <label class="block">
        <span class="text-sm font-medium text-ink-muted">Mobile number</span>
        <input type="tel" name="phone" required placeholder="10-digit mobile" class="mt-1.5 w-full px-3 py-2.5">
      </label>
      <button class="btn btn-primary w-full">Send OTP</button>
    </form>
  </div>

  <div class="mt-6 card p-6 bg-navy-50 border-navy-100">
    <details>
      <summary class="text-sm font-semibold text-primary cursor-pointer">Staff / Ops login</summary>
      <form method="post" action="{{ url_for('auth.staff_login') }}" class="mt-4 space-y-3">
        <input type="email" name="email" required placeholder="Email" class="w-full px-3 py-2.5">
        <input type="password" name="password" required placeholder="Password" class="w-full px-3 py-2.5">
        <button class="btn btn-primary w-full">Staff login</button>
      </form>
    </details>
  </div>
</section>
{% endblock %}
